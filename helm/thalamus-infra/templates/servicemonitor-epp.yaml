{{- if .Values.monitoring.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: epp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- with .Values.monitoring.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- with .Values.monitoring.namespaceSelector }}
  namespaceSelector:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      inference.networking.k8s.io/igw-mode: inferencepool
  endpoints:
    - port: http-metrics
      path: /metrics
{{- end }}
