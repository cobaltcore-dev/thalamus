{{- if and (.Capabilities.APIVersions.Has "dns.gardener.cloud/v1alpha1") (index .Values "kube-prometheus-stack" "enabled") }}
{{- fail "kube-prometheus-stack must be disabled on Gardener clusters: use the Greenhouse kube-monitoring plugin instead" }}
{{- end }}
{{- if and (not (.Capabilities.APIVersions.Has "dns.gardener.cloud/v1alpha1")) (not (index .Values "kube-prometheus-stack" "enabled")) }}
{{- fail "kube-prometheus-stack must be enabled on non-Gardener clusters: no external monitoring plugin is available" }}
{{- end }}