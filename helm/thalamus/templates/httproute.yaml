apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: aggregated-models
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
  rules:
    - matches:
        - path:
            type: Exact
            value: /v1/models
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: aggregated-models
  namespace: {{ .Values.namespace }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: aggregated-models
  traffic:
    directResponse:
      status: 200
      body: |
        {
          "object": "list",
          "data": [
            {{- range $i, $m := .Values.models }}
            {
              "id": {{ $m.model | quote }},
              "object": "model",
              "owned_by": {{ $m.model | splitList "/" | first | quote }}
            }{{ if lt (add1 $i) (len $.Values.models) }},{{ end }}
            {{- end }}
          ]
        }
    headerModifiers:
      response:
        set:
          - name: Content-Type
            value: application/json
